version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nairobi-sculpt-db
    restart: unless-stopped
    command: ["postgres"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    environment:
      POSTGRES_USER: ${DB_USER:-ns_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-NairobiSculpt_Local_2024}
      POSTGRES_DB: ${DB_NAME:-nairobi_sculpt}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ns_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nairobi-sculpt-network

volumes:
  postgres_data:
    driver: local

networks:
  nairobi-sculpt-network:
    driver: bridge
