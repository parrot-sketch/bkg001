name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # TIER 1: Lint + Type-Check + Unit Tests  (every push/PR)
  # ──────────────────────────────────────────────────────────
  unit:
    name: Lint · Types · Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test:unit

  # ──────────────────────────────────────────────────────────
  # TIER 2: Integration Tests  (Docker Postgres, every push/PR)
  # NOTE: Integration tests currently disabled due to test data issues
  # ──────────────────────────────────────────────────────────
  integration:
    name: Integration Tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit  # only run if unit tests pass

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/test_db
      JWT_SECRET: test-secret-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Apply migrations to test DB
        run: pnpm prisma migrate deploy

      - name: Run integration tests
        run: pnpm vitest run --config vitest.config.integration.ts --exclude 'tests/integration/booking-concurrency.test.ts' --exclude 'tests/integration/check-in-flow.test.ts' --exclude 'tests/integration/frontdesk-theater-booking.test.ts' --exclude 'tests/integration/team-assignment.test.ts' --exclude 'tests/integration/auth/**' --exclude 'tests/integration/consents-phase2/**' --exclude 'tests/integration/frontdesk-booking/**' --exclude 'tests/integration/inventory-billing/**' --exclude 'tests/integration/surgical-plan/**' --exclude 'tests/integration/theater-tech/**'

  # ──────────────────────────────────────────────────────────
  # BUILD: Verify Next.js build succeeds
  # ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit
    env:
      SKIP_MIGRATION: "true"
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      OPENAI_API_KEY: "sk-dummy-key-for-ci"
      JWT_SECRET: "dummy-jwt-secret"
      JWT_REFRESH_SECRET: "dummy-jwt-refresh-secret"
      DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      SHADOW_DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Build
        run: pnpm build
